    var currentLang = 'en';

    (function() {
        function launchPlayer(el, muted) {
            if (el.querySelector('iframe')) return;
            var id = el.getAttribute('data-video-id');
            var params = el.getAttribute('data-params') || 'color=ffffff&title=0&byline=0&portrait=0';
            var playBtn = el.querySelector('.vimeo-play-btn');
            var spinner = el.querySelector('.vimeo-spinner');
            var thumb = el.querySelector('img');
            if (playBtn) playBtn.style.display = 'none';
            if (spinner) { spinner.style.display = 'block'; spinner.style.zIndex = '3'; }
            var muteParam = muted ? '&muted=1' : '';
            var iframe = document.createElement('iframe');
            iframe.setAttribute('src', 'https://player.vimeo.com/video/' + id + '?' + params + '&autoplay=1&playsinline=1&api=1' + muteParam);
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
            iframe.setAttribute('allowfullscreen', '');
            // Keep iframe invisible until Vimeo fires 'play' - thumbnail stays visible meanwhile
            iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:0;opacity:0;z-index:2;';

            function onVimeoMsg(e) {
                if (e.origin !== 'https://player.vimeo.com') return;
                if (e.source !== iframe.contentWindow) return;
                try {
                    var data = JSON.parse(e.data);
                    if (data.event === 'ready') {
                        // Subscribe to play event
                        iframe.contentWindow.postMessage(JSON.stringify({method:'addEventListener',value:'play'}), 'https://player.vimeo.com');
                    }
                    if (data.event === 'play') {
                        // Video is actually playing - now show it and hide thumbnail
                        iframe.style.transition = 'opacity 0.4s';
                        iframe.style.opacity = '1';
                        if (spinner) spinner.style.display = 'none';
                        if (thumb) thumb.style.display = 'none';
                        window.removeEventListener('message', onVimeoMsg);
                    }
                } catch(err) {}
            }
            window.addEventListener('message', onVimeoMsg);
            el.appendChild(iframe);
        }

        var facades = document.querySelectorAll('.vimeo-facade');
        if (facades.length > 0) launchPlayer(facades[0], true);
        facades.forEach(function(el) {
            el.addEventListener('click', function() { launchPlayer(el, false); });
        });
    })();

    (function() {
        var header = document.querySelector('.Header');
        var footerNav = document.getElementById('FooterNav');
        var cc = document.querySelector('.cc');
        function updateCopyright() {
            if (!cc || !footerNav) return;

            if (current <= 0) {

            } else if (current > lastScroll) {
                header.classList.add('hidden');
                if (footerNav) footerNav.classList.remove('hidden');
            } else {
                header.classList.remove('hidden');
                if (footerNav) footerNav.classList.add('hidden');
            }
            lastScroll = current;
            updateCopyright();
        });
        window.addEventListener('load', updateCopyright);
        window.addEventListener('resize', updateCopyright);
    })();
    </script>
        <script>
    (function() {
        var canvas = document.createElement('canvas');
        canvas.id = 'neon-canvas';
        document.body.appendChild(canvas);
        var ctx = canvas.getContext('2d');
        var overlay = document.createElement('div');
        overlay.id = 'neon-overlay';
        document.body.appendChild(overlay);
        var targetEl = null, rafId = null;
        var PERIOD = (('ontouchstart' in window)||navigator.maxTouchPoints>0)?250:2000, TAIL = 1.24;
        var globalStartTime = null;
        function getPoint(pos, ox, oy, w, h) {
            var perimeter = 2*(w+h);
            var d = ((pos%1)+1)%1*perimeter;
            if (d<=w)          return {x:ox+d,         y:oy};
            else if (d<=w+h)   return {x:ox+w,         y:oy+(d-w)};
            else if (d<=2*w+h) return {x:ox+w-(d-w-h), y:oy+h};
            else               return {x:ox,            y:oy+h-(d-2*w-h)};
        }
        function lerp(a,b,t){return a+(b-a)*t;}
        function updatePos() {
            if (!targetEl) return;
            var r = targetEl.getBoundingClientRect();
            overlay.style.left=r.left+'px'; overlay.style.top=r.top+'px';
            overlay.style.width=r.width+'px'; overlay.style.height=r.height+'px';
            canvas.style.left=r.left+'px'; canvas.style.top=r.top+'px';
        }
        function drawFrame(ts) {
            if (!targetEl) return;
            if (!globalStartTime) globalStartTime = ts;
            var r = targetEl.getBoundingClientRect();
            overlay.style.left=r.left+'px'; overlay.style.top=r.top+'px';
            overlay.style.width=r.width+'px'; overlay.style.height=r.height+'px';
            canvas.style.left=r.left+'px'; canvas.style.top=r.top+'px';
            canvas.width=r.width; canvas.height=r.height;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            var headPos=((ts-globalStartTime)%PERIOD)/PERIOD;
            for (var s=0;s<200;s++) {
                var t=s/200;
                var alpha=Math.pow(t,2.4);
                if(alpha<0.015) continue;
                var p0=getPoint((headPos-TAIL*(1-t)+4)%1,0,0,r.width,r.height);
                var p1=getPoint((headPos-TAIL*(1-(s+1)/200)+4)%1,0,0,r.width,r.height);
                var lw=lerp(0.0,5.68,t);
                ctx.shadowBlur = t>0.68 ? lerp(0,21.6,(t-0.68)/0.32) : 0;
                ctx.shadowColor='rgba(255,255,255,1)';
                ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
                ctx.strokeStyle='rgba(255,255,255,'+alpha+')';
                ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
            }
            ctx.shadowBlur=0;
            rafId=requestAnimationFrame(drawFrame);
        }
        function showGlow(t) {
            targetEl=t;
            canvas.classList.add('visible'); overlay.classList.add('visible');
            if (rafId) cancelAnimationFrame(rafId);
            rafId=requestAnimationFrame(drawFrame);
        }
        function hideGlow() {
            canvas.style.transition='none'; overlay.style.transition='none';
            canvas.classList.remove('visible'); overlay.classList.remove('visible');
            if (rafId){cancelAnimationFrame(rafId);rafId=null;}
            targetEl=null; ctx.clearRect(0,0,canvas.width,canvas.height);
            requestAnimationFrame(function(){canvas.style.transition='';overlay.style.transition='';});
        }
        document.querySelectorAll('.grid li');  // (binding por delegacion abajo)
        // ── Delegacion de eventos: el cometa funciona aunque global.js
        //    construya el grid despues (script deferido). Escuchamos en
        //    document y resolvemos el .grid li al vuelo. ──
        var _cometLi = null;
        document.addEventListener('mouseover', function(e){
            if (!e.target.closest) return;
            var li = e.target.closest('.grid li');
            if (!li || li === _cometLi) return;
            _cometLi = li;
            var tgt = li.querySelector('video')||li.querySelector('img')||li.querySelector('.box')||li;
            showGlow(tgt);
        });
        document.addEventListener('mouseout', function(e){
            if (!_cometLi || !e.target.closest) return;
            var li = e.target.closest('.grid li');
            if (!li || li !== _cometLi) return;
            if (e.relatedTarget && li.contains(e.relatedTarget)) return;
            _cometLi = null;
            hideGlow();
        });
        document.addEventListener('pointerdown', function(e){
            if (!e.target.closest) return;
            var li = e.target.closest('.grid li');
            if (!li) return;
            var tgt = li.querySelector('video')||li.querySelector('img')||li.querySelector('.box')||li;
            showGlow(tgt);
        }, {passive:true});
        document.addEventListener('touchstart', function(e){
            if (!e.target.closest) return;
            var li = e.target.closest('.grid li');
            if (!li) return;
            var tgt = li.querySelector('video')||li.querySelector('img')||li.querySelector('.box')||li;
            showGlow(tgt);
        }, {passive:true});
        document.addEventListener('touchend', function(e){
            if (!e.target.closest) return;
            var li = e.target.closest('.grid li');
            if (!li) return;
            setTimeout(hideGlow, 600);
        }, {passive:true});
        // Scroll gestionado por global.js
        document.addEventListener('visibilitychange',function(){if(document.hidden)hideGlow();});
    })();
    </script>
